<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>詠順工程行｜文件產生器</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:      #1871b5;
    --blue-dark: #145fa0;
    --blue-pale: #e8f2fb;
    --line:      #d0dcea;
    --text:      #1a2233;
    --sub:       #6b7a92;
    --bg:        #f4f7fb;
    --white:     #ffffff;
    --radius:    12px;
    --shadow:    0 2px 16px rgba(24,113,181,0.10);
    --shadow-hv: 0 6px 28px rgba(24,113,181,0.18);
  }

  body {
    font-family: 'Microsoft JhengHei','微軟正黑體','PingFang TC',Arial,sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  /* ── 密碼頁 ── */
  #loginPage {
    width: 100%;
    max-width: 420px;
    animation: fadeIn .35s ease;
  }

  .login-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 48px 40px 40px;
    text-align: center;
  }

  .brand-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--blue-pale);
    color: var(--blue);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .5px;
    padding: 6px 14px;
    border-radius: 99px;
    margin-bottom: 28px;
  }

  .brand-badge svg { width: 14px; height: 14px; flex-shrink: 0; }

  .login-card h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .5px;
    margin-bottom: 8px;
  }

  .login-card p {
    font-size: 13.5px;
    color: var(--sub);
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .input-wrap input {
    width: 100%;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    padding: 13px 46px 13px 16px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: #fafcff;
    outline: none;
    transition: border .2s, box-shadow .2s;
    letter-spacing: 2px;
  }

  .input-wrap input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(24,113,181,.12);
    background: #fff;
  }

  .toggle-eye {
    position: absolute;
    right: 13px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--sub);
    padding: 4px;
    line-height: 0;
    transition: color .15s;
  }
  .toggle-eye:hover { color: var(--blue); }

  .login-btn {
    width: 100%;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background .2s, transform .1s, box-shadow .2s;
    box-shadow: 0 3px 10px rgba(24,113,181,.25);
  }
  .login-btn:hover  { background: var(--blue-dark); box-shadow: 0 5px 16px rgba(24,113,181,.32); }
  .login-btn:active { transform: scale(.98); }

  .error-msg {
    font-size: 12.5px;
    color: #d32f2f;
    margin-top: 10px;
    min-height: 18px;
    text-align: left;
  }

  /* ── 選單頁 ── */
  #menuPage {
    width: 100%;
    max-width: 560px;
    display: none;
    animation: fadeIn .4s ease;
  }

  .menu-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .menu-header .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .logo-icon {
    width: 38px; height: 38px;
    background: var(--blue);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 22px; height: 22px; color: #fff; }

  .menu-header h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .5px;
  }

  .menu-header p {
    font-size: 13px;
    color: var(--sub);
    margin-top: 4px;
  }

  .card-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 28px;
  }

  .doc-card {
    background: var(--white);
    border: 1.5px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 18px;
    text-decoration: none;
    color: inherit;
    box-shadow: var(--shadow);
    transition: border-color .2s, box-shadow .2s, transform .15s;
    cursor: pointer;
  }

  .doc-card:hover {
    border-color: var(--blue);
    box-shadow: var(--shadow-hv);
    transform: translateY(-2px);
  }

  .card-icon {
    width: 48px; height: 48px; flex-shrink: 0;
    background: var(--blue-pale);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .card-icon svg { width: 26px; height: 26px; color: var(--blue); }

  .card-body { flex: 1; }

  .card-body strong {
    display: block;
    font-size: 15.5px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
    letter-spacing: .3px;
  }

  .card-body span {
    font-size: 12.5px;
    color: var(--sub);
  }

  .card-arrow {
    color: var(--blue);
    opacity: .5;
    transition: opacity .2s, transform .2s;
  }
  .doc-card:hover .card-arrow { opacity: 1; transform: translateX(3px); }

  .logout-row {
    text-align: center;
  }

  .logout-btn {
    background: none;
    border: none;
    font-size: 12.5px;
    color: var(--sub);
    cursor: pointer;
    font-family: inherit;
    padding: 6px 12px;
    border-radius: 6px;
    transition: color .15s, background .15s;
  }
  .logout-btn:hover { color: var(--blue); background: var(--blue-pale); }

  /* ── 分隔線 ── */
  .divider {
    border: none;
    border-top: 1px solid var(--line);
    margin: 28px 0;
  }

  /* ── 動畫 ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RWD ── */
  @media (max-width: 480px) {
    .login-card { padding: 36px 24px 32px; }
    .doc-card   { padding: 16px 18px; gap: 14px; }
    .card-icon  { width: 42px; height: 42px; }
  }
</style>
</head>
<body>

<!-- ══════════════ 密碼頁 ══════════════ -->
<div id="loginPage">
  <div class="login-card">

    <div class="brand-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      詠順工程行
    </div>

    <h1>文件產生系統</h1>
    <p>請輸入公司密碼以進入<br>保固書 ／ 報價單 ／ 檢測報告書 產生器</p>

    <div class="input-wrap">
      <input type="password" id="pwInput" placeholder="請輸入密碼"
             onkeydown="if(event.key==='Enter') doLogin()">
      <button class="toggle-eye" onclick="togglePw()" title="顯示／隱藏密碼">
        <svg id="eyeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <button class="login-btn" onclick="doLogin()">進入系統</button>
    <div class="error-msg" id="errorMsg"></div>

  </div>
</div>

<!-- ══════════════ 選單頁 ══════════════ -->
<div id="menuPage">

  <div class="menu-header">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <h2>詠順工程行</h2>
    </div>
    <p>請選擇要開啟的文件產生器</p>
  </div>

  <div class="card-list">

    <!-- 檢測報告書 -->
    <a class="doc-card" href="https://mrbusinesslab.github.io/Yong-Shun/%E6%AA%A2%E6%B8%AC%E5%A0%B1%E5%91%8A%E6%9B%B8/report.html" target="_blank" rel="noopener">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
      </div>
      <div class="card-body">
        <strong>檢測報告書</strong>
        <span>產生漏水檢測現場報告 PDF</span>
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" width="18" height="18" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>

    <!-- 報價單 -->
    <a class="doc-card" href="https://mrbusinesslab.github.io/Yong-Shun/%E5%A0%B1%E5%83%B9%E5%96%AE/quotation.html" target="_blank" rel="noopener">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
      </div>
      <div class="card-body">
        <strong>工程報價單</strong>
        <span>建立工程估價明細與報價 PDF</span>
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" width="18" height="18" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>

    <!-- 保固書 -->
    <a class="doc-card" href="https://mrbusinesslab.github.io/Yong-Shun/%E4%BF%9D%E5%9B%BA%E6%9B%B8/warranty.html" target="_blank" rel="noopener">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="card-body">
        <strong>施工保固書</strong>
        <span>產生工程竣工保固證明文件 PDF</span>
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" width="18" height="18" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>

  </div>

  <hr class="divider">

  <div class="logout-row">
    <button class="logout-btn" onclick="doLogout()">
      ← 登出
    </button>
  </div>

</div>

<script>
  const CORRECT_PW = 'srsr520520';
  const SESSION_KEY = 'yongshun_auth';

  // 頁面載入時檢查 session
  window.onload = () => {
    if (sessionStorage.getItem(SESSION_KEY) === '1') showMenu();
    else document.getElementById('loginPage').style.display = '';
  };

  function doLogin() {
    const val = document.getElementById('pwInput').value;
    const err = document.getElementById('errorMsg');
    if (val === CORRECT_PW) {
      sessionStorage.setItem(SESSION_KEY, '1');
      err.textContent = '';
      document.getElementById('loginPage').style.animation = 'none';
      document.getElementById('loginPage').style.opacity = '0';
      document.getElementById('loginPage').style.transition = 'opacity .25s';
      setTimeout(showMenu, 260);
    } else {
      err.textContent = '密碼錯誤，請再試一次。';
      document.getElementById('pwInput').select();
      // 抖動效果
      const input = document.getElementById('pwInput');
      input.style.borderColor = '#d32f2f';
      setTimeout(() => input.style.borderColor = '', 800);
    }
  }

  function showMenu() {
    document.getElementById('loginPage').style.display = 'none';
    const menu = document.getElementById('menuPage');
    menu.style.display = 'block';
  }

  function doLogout() {
    sessionStorage.removeItem(SESSION_KEY);
    document.getElementById('menuPage').style.display = 'none';
    const login = document.getElementById('loginPage');
    login.style.display = '';
    login.style.opacity = '1';
    login.style.animation = 'fadeIn .35s ease';
    document.getElementById('pwInput').value = '';
    document.getElementById('errorMsg').textContent = '';
  }

  function togglePw() {
    const input = document.getElementById('pwInput');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      input.type = 'password';
      icon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>`;
    }
  }
</script>
</body>
</html>
