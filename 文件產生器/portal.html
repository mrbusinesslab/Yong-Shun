<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>詠順工程行｜文件產生器</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:      #1871b5;
    --blue-dark: #145fa0;
    --blue-pale: #e8f2fb;
    --line:      #d0dcea;
    --text:      #1a2233;
    --sub:       #6b7a92;
    --bg:        #f4f7fb;
    --white:     #ffffff;
    --radius:    12px;
    --shadow:    0 2px 16px rgba(24,113,181,0.10);
    --shadow-hv: 0 6px 28px rgba(24,113,181,0.18);
  }

  body {
    font-family: 'Microsoft JhengHei','微軟正黑體','PingFang TC',Arial,sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  /* ── 密碼頁 ── */
  #loginPage {
    width: 100%;
    max-width: 420px;
    animation: fadeIn .35s ease;
  }

  .login-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 48px 40px 40px;
    text-align: center;
  }

  .brand-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--blue-pale);
    color: var(--blue);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .5px;
    padding: 6px 14px;
    border-radius: 99px;
    margin-bottom: 28px;
  }

  .brand-badge svg { width: 14px; height: 14px; flex-shrink: 0; }

  .login-card h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .5px;
    margin-bottom: 8px;
  }

  .login-card p {
    font-size: 13.5px;
    color: var(--sub);
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .input-wrap input {
    width: 100%;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    padding: 13px 46px 13px 16px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: #fafcff;
    outline: none;
    transition: border .2s, box-shadow .2s;
    letter-spacing: 2px;
  }

  .input-wrap input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(24,113,181,.12);
    background: #fff;
  }

  .toggle-eye {
    position: absolute;
    right: 13px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--sub);
    padding: 4px;
    line-height: 0;
    transition: color .15s;
  }
  .toggle-eye:hover { color: var(--blue); }

  .login-btn {
    width: 100%;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background .2s, transform .1s, box-shadow .2s;
    box-shadow: 0 3px 10px rgba(24,113,181,.25);
  }
  .login-btn:hover  { background: var(--blue-dark); box-shadow: 0 5px 16px rgba(24,113,181,.32); }
  .login-btn:active { transform: scale(.98); }

  .error-msg {
    font-size: 12.5px;
    color: #d32f2f;
    margin-top: 10px;
    min-height: 18px;
    text-align: left;
  }

  .remember-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    color: var(--sub);
    margin-bottom: 18px;
    cursor: pointer;
    text-align: left;
  }
  .remember-row input {
    width: 15px; height: 15px;
    accent-color: var(--blue);
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ── 選單頁 ── */
  #menuPage {
    width: 100%;
    max-width: 1320px;
    display: none;
    animation: fadeIn .4s ease;
  }

  .menu-layout { display: flex; gap: 28px; align-items: flex-start; }
  .menu-main { flex: 1; min-width: 0; }

  .warranty-panel {
    width: 300px; flex-shrink: 0; position: sticky; top: 24px;
    background: var(--white); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 18px; box-shadow: var(--shadow); max-height: calc(100vh - 48px); overflow-y: auto;
  }
  .warranty-panel-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
  .warranty-list { display: flex; flex-direction: column; gap: 10px; }
  .warranty-item {
    border-radius: 8px; padding: 10px 12px; border-left: 4px solid #ccc; background: #fafbfc;
  }
  .warranty-item.red { border-left-color: #e53935; background: #fdecea; }
  .warranty-item.orange { border-left-color: #e8a13c; background: #fff6e8; }
  .warranty-item .w-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .warranty-item .w-meta { font-size: 11.5px; color: var(--sub); margin-top: 3px; line-height: 1.6; }
  .warranty-item .w-days { font-size: 11px; font-weight: 700; margin-top: 4px; }
  .warranty-item.red .w-days { color: #c0392b; }
  .warranty-item.orange .w-days { color: #b5720f; }
  .warranty-empty { font-size: 12.5px; color: var(--sub); text-align: center; padding: 12px 0; }

  @media (max-width: 1050px) {
    .menu-layout { flex-direction: column; }
    .warranty-panel { width: 100%; position: static; max-height: none; }
  }

  .menu-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .menu-header .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .logo-icon {
    width: 38px; height: 38px;
    background: var(--blue);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 22px; height: 22px; color: #fff; }

  .menu-header h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .5px;
  }

  .menu-header p {
    font-size: 13px;
    color: var(--sub);
    margin-top: 4px;
  }
  .dashboard-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:0 0 24px; }
  .stat-card { background:var(--white); border:1px solid var(--line); border-radius:9px; padding:12px 14px; text-align:center; }
  .stat-card strong { display:block; font-size:22px; color:var(--blue); }
  .stat-card span { font-size:12px; color:var(--sub); }
  @media (max-width: 680px) { .dashboard-stats { grid-template-columns:repeat(2,1fr); } }

  .card-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
  }

  .doc-card {
    background: var(--white);
    border: 1.5px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 20px 22px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 14px;
    text-decoration: none;
    color: inherit;
    box-shadow: var(--shadow);
    transition: border-color .2s, box-shadow .2s, transform .15s;
    cursor: pointer;
  }

  .doc-card:hover {
    border-color: var(--blue);
    box-shadow: var(--shadow-hv);
    transform: translateY(-2px);
  }

  .doc-card-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .card-icon {
    width: 42px; height: 42px; flex-shrink: 0;
    background: var(--blue-pale);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .card-icon svg { width: 24px; height: 24px; color: var(--blue); }

  .card-body strong {
    display: block;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .3px;
    line-height: 1.3;
  }

  .card-body span {
    display: block;
    font-size: 12.5px;
    color: var(--sub);
    margin-top: 3px;
    line-height: 1.4;
  }

  .card-preview {
    width: 100%;
    aspect-ratio: 210 / 297; /* A4 直式比例 */
    background: #f4f7fb;
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  .card-arrow {
    color: var(--blue);
    opacity: .5;
    transition: opacity .2s, transform .2s;
    align-self: flex-end;
  }
  .doc-card:hover .card-arrow { opacity: 1; transform: translateX(3px); }

  .logout-row {
    text-align: center;
  }

  .logout-btn {
    background: none;
    border: none;
    font-size: 12.5px;
    color: var(--sub);
    cursor: pointer;
    font-family: inherit;
    padding: 6px 12px;
    border-radius: 6px;
    transition: color .15s, background .15s;
  }
  .logout-btn:hover { color: var(--blue); background: var(--blue-pale); }

  /* ── 分隔線 ── */
  .divider {
    border: none;
    border-top: 1px solid var(--line);
    margin: 28px 0;
  }

  /* ── 動畫 ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RWD ── */
  @media (max-width: 480px) {
    .login-card { padding: 36px 24px 32px; }
    .doc-card   { padding: 16px 16px 18px; }
  }

  /* ── 最近項目 ── */
  .recent-section { margin-bottom: 32px; }
  .recent-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .recent-header h3 { font-size: 15px; font-weight: 700; color: var(--text); }
  .recent-search { border: 1.5px solid var(--line); border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: inherit; width: 240px; background: #fafcff; outline: none; }
  .recent-search:focus { border-color: var(--blue); background: #fff; }
  .recent-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
  .recent-item {
    background: var(--white); border: 1.5px solid var(--line); border-radius: 10px;
    padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
    gap: 14px; box-shadow: var(--shadow); flex-wrap: wrap;
  }
  .recent-info { min-width: 180px; }
  .recent-name { font-size: 14.5px; font-weight: 700; color: var(--text); }
  .recent-meta { font-size: 12px; color: var(--sub); margin-top: 3px; }
  .recent-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .recent-item { position: relative; }
  .recent-menu-wrap { position: relative; margin-left: 4px; }
  .recent-menu-btn {
    background: none; border: none; font-size: 18px; line-height: 1; color: var(--sub);
    cursor: pointer; padding: 6px 10px; border-radius: 6px; font-family: inherit;
  }
  .recent-menu-btn:hover { background: var(--blue-pale); color: var(--blue); }
  .recent-dropdown {
    position: absolute; right: 0; top: 32px; background: var(--white); border: 1.5px solid var(--line);
    border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,0.14); min-width: 150px; z-index: 50; display: none; overflow: hidden;
  }
  .recent-dropdown.open { display: block; }
  .recent-dropdown button {
    width: 100%; text-align: left; padding: 10px 14px; border: none; background: none;
    font-size: 13px; cursor: pointer; font-family: inherit; color: var(--text);
  }
  .recent-dropdown button:hover { background: #f4f6f8; }
  .pin-badge { color: #c98a1d; margin-right: 4px; }
  .recent-btn {
    background: var(--blue-pale); color: var(--blue); border: none; border-radius: 7px;
    padding: 7px 12px; font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: inherit;
    text-decoration: none; white-space: nowrap; transition: background .15s;
  }
  .recent-btn:hover { background: var(--blue); color: #fff; }
  .recent-btn.edit-btn { background: #fdf0e0; color: #b56a1a; }
  .recent-btn.edit-btn:hover { background: #e8a13c; color: #fff; }
  .recent-empty, .recent-loading { font-size: 13px; color: var(--sub); padding: 16px; text-align: center; background: var(--white); border-radius: 10px; border: 1.5px dashed var(--line); }
</style>
</head>
<body>

<!-- ══════════════ 密碼頁 ══════════════ -->
<div id="loginPage">
  <div class="login-card">

    <div class="brand-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      詠順工程行
    </div>

    <h1>文件產生系統</h1>
    <p>請使用 Supabase 帳號登入<br>保固書 ／ 報價單 ／ 檢測報告書 ／ 委託書 產生器</p>

    <div class="input-wrap">
      <input type="email" id="emailInput" placeholder="登入 Email"
             autocomplete="email" onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <div class="input-wrap">
      <input type="password" id="pwInput" placeholder="登入密碼"
             autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
      <button class="toggle-eye" onclick="togglePw()" title="顯示／隱藏密碼">
        <svg id="eyeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <label class="remember-row">
      <input type="checkbox" id="rememberMe" checked>
      <span>保持登入狀態</span>
    </label>

    <button class="login-btn" onclick="doLogin()">進入系統</button>
    <div class="error-msg" id="errorMsg"></div>

  </div>
</div>

<!-- ══════════════ 選單頁 ══════════════ -->
<div id="menuPage">

  <div class="menu-layout">
  <div class="menu-main">

  <div class="menu-header">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <h2>詠順工程行</h2>
    </div>
    <p>請選擇要開啟的文件產生器</p>
  </div>

  <div class="dashboard-stats" id="dashboardStats" aria-label="案件統計">
    <div class="stat-card"><strong>—</strong><span>進行中案件</span></div>
    <div class="stat-card"><strong>—</strong><span>本月案件</span></div>
    <div class="stat-card"><strong>—</strong><span>本月成交</span></div>
    <div class="stat-card"><strong>—</strong><span>兩年內保固到期</span></div>
  </div>

  <div class="recent-section">
    <div class="recent-header">
      <h3>📂 最近項目</h3>
      <input type="text" class="recent-search" id="recentSearch" placeholder="搜尋姓名／電話／地址／案號..." oninput="filterRecent()">
    </div>
    <div class="recent-list" id="recentList">
      <div class="recent-loading">讀取中...</div>
    </div>
  </div>

  <div class="card-list">

    <!-- 檢測報告書 -->
    <a class="doc-card" href="https://mrbusinesslab.github.io/Yong-Shun/%E6%AA%A2%E6%B8%AC%E5%A0%B1%E5%91%8A%E6%9B%B8/report.html" target="_blank" rel="noopener">
      <div class="doc-card-title">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
        </div>
        <div class="card-body">
          <strong>檢測報告書</strong>
          <span>產生漏水檢測現場報告 PDF</span>
        </div>
      </div>
      <div class="card-preview">
        <img src="範例圖1.png" alt="檢測報告書範例" loading="lazy" onerror="imgFallback(this,'範例圖1.png')">
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" width="16" height="16" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>

    <!-- 報價單 -->
    <a class="doc-card" href="https://mrbusinesslab.github.io/Yong-Shun/%E5%A0%B1%E5%83%B9%E5%96%AE/quotation.html" target="_blank" rel="noopener">
      <div class="doc-card-title">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
        <div class="card-body">
          <strong>工程報價單</strong>
          <span>建立工程估價明細與報價 PDF</span>
        </div>
      </div>
      <div class="card-preview">
        <img src="範例圖2.png" alt="工程報價單範例" loading="lazy" onerror="imgFallback(this,'範例圖2.png')">
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" width="16" height="16" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>

    <!-- 保固書 -->
    <a class="doc-card" href="https://mrbusinesslab.github.io/Yong-Shun/%E4%BF%9D%E5%9B%BA%E6%9B%B8/warranty.html" target="_blank" rel="noopener">
      <div class="doc-card-title">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div class="card-body">
          <strong>施工保固書</strong>
          <span>產生工程竣工保固證明文件 PDF</span>
        </div>
      </div>
      <div class="card-preview">
        <img src="範例圖3.png" alt="施工保固書範例" loading="lazy" onerror="imgFallback(this,'範例圖3.png')">
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" width="16" height="16" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>

    <!-- 第三方委託書 -->
    <a class="doc-card" href="https://mrbusinesslab.github.io/Yong-Shun/%E7%AC%AC%E4%B8%89%E6%96%B9%E5%A7%94%E8%A8%97%E6%9B%B8/commission.html" target="_blank" rel="noopener">
      <div class="doc-card-title">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="13" y2="17"/>
          </svg>
        </div>
        <div class="card-body">
          <strong>第三方委託書</strong>
          <span>設計師／房仲委託檢測或施工 PDF</span>
        </div>
      </div>
      <div class="card-preview">
        <img src="範例圖4.png" alt="第三方委託書範例" loading="lazy" onerror="imgFallback(this,'範例圖4.png')">
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" width="16" height="16" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>

    <!-- 施工驗收報告 -->
    <a class="doc-card" href="https://mrbusinesslab.github.io/Yong-Shun/%E9%A9%97%E6%94%B6%E5%A0%B1%E5%91%8A/acceptance-report.html" target="_blank" rel="noopener">
      <div class="doc-card-title">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 12l2 2 4-4"/>
            <circle cx="12" cy="12" r="10"/>
          </svg>
        </div>
        <div class="card-body">
          <strong>施工驗收報告</strong>
          <span>施工完成後複查問題點位並產生驗收 PDF</span>
        </div>
      </div>
      <div class="card-preview">
        <img src="範例圖5.png" alt="施工驗收報告範例" loading="lazy" onerror="imgFallback(this,'範例圖5.png')">
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" width="16" height="16" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>

  </div>

  <hr class="divider">

  <div class="logout-row">
    <button class="logout-btn" onclick="doLogout()">
      ← 登出
    </button>
  </div>

  </div>
  <!-- /menu-main -->

  <!-- 保固到期提醒側欄 -->
  <div class="warranty-panel">
    <div class="warranty-panel-title">🛡️ 保固到期提醒</div>
    <div class="warranty-list" id="warrantyList">
      <div class="recent-loading">讀取中...</div>
    </div>
  </div>

  </div>
  <!-- /menu-layout -->

</div>

<script>
  function imgFallback(img, name) {
    img.parentElement.innerHTML = '<span style="font-size:11px;color:#bbb;text-align:center;line-height:1.6;">' + name + '<br>尚未上傳</span>';
  }

  /* ══════════════ Supabase 初始化 ══════════════ */
  const SUPABASE_URL = 'https://dephqbwfvbrawytlzuau.supabase.co';
  const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_Ko8n68XsRz8KyFnKXBP4rQ_WjByFvwv';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
  });
  let currentUser = null;

  // 各文件產生器的網址（沿用你現有的資料夾與檔名規則）
  // ※ 若之後路徑有調整，只要改這裡即可，其他地方不用動
  const DOC_URLS = {
    report:     'https://mrbusinesslab.github.io/Yong-Shun/%E6%AA%A2%E6%B8%AC%E5%A0%B1%E5%91%8A%E6%9B%B8/report.html',
    quotation:  'https://mrbusinesslab.github.io/Yong-Shun/%E5%A0%B1%E5%83%B9%E5%96%AE/quotation.html',
    warranty:   'https://mrbusinesslab.github.io/Yong-Shun/%E4%BF%9D%E5%9B%BA%E6%9B%B8/warranty.html',
    commission: 'https://mrbusinesslab.github.io/Yong-Shun/%E7%AC%AC%E4%B8%89%E6%96%B9%E5%A7%94%E8%A8%97%E6%9B%B8/commission.html',
    acceptance: 'https://mrbusinesslab.github.io/Yong-Shun/%E9%A9%97%E6%94%B6%E5%A0%B1%E5%91%8A/acceptance-report.html',
  };

  let allRecentCases = [];

  async function loadDashboard() {
    const target = document.getElementById('dashboardStats');
    const { data, error } = await supabaseClient.rpc('portal_dashboard');
    if (error) { console.error(error); return; }
    const stats = [
      [data.open_cases, '進行中案件'], [data.this_month_cases, '本月案件'],
      [data.this_month_deals, '本月成交'], [data.expiring_warranties, '兩年內保固到期']
    ];
    target.innerHTML = stats.map(([value, label]) => `<div class="stat-card"><strong>${Number(value || 0).toLocaleString('zh-TW')}</strong><span>${label}</span></div>`).join('');
  }

  async function loadRecentCases() {
    const listEl = document.getElementById('recentList');
    try {
      const { data, error } = await supabaseClient.from('cases')
        .select('id, case_number, site_address, updated_at, customers(name), case_pins!left(user_id)')
        .neq('status', 'closed').neq('status', 'cancelled')
        .order('updated_at', { ascending: false }).limit(15);
      if (error) throw error;
      allRecentCases = (data || []).map(c => ({
        id: c.id, caseNumber: c.case_number, clientAddress: c.site_address, updatedAt: c.updated_at,
        clientName: c.customers?.name || '', pinned: (c.case_pins || []).some(p => p.user_id === currentUser?.id)
      }));
      renderRecentList(allRecentCases);
    } catch (err) {
      console.error(err);
      listEl.innerHTML = '<div class="recent-empty">⚠️ 無法讀取最近項目（' + err.message + '）</div>';
    }
  }

  function esc(str) { return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function isPinned(id) { return allRecentCases.find(c => c.id === id)?.pinned === true; }
  async function togglePin(id) {
    const pinned = isPinned(id);
    try {
      const query = pinned
        ? supabaseClient.from('case_pins').delete().eq('case_id', id).eq('user_id', currentUser.id)
        : supabaseClient.from('case_pins').insert({ case_id: id, user_id: currentUser.id });
      const { error } = await query;
      if (error) throw error;
      await loadRecentCases();
    } catch (err) { alert('置頂設定失敗：' + err.message); }
  }
  async function markCaseClosed(id) {
    try {
      const { error } = await supabaseClient.from('cases').update({ status: 'closed', closed_at: new Date().toISOString() }).eq('id', id);
      if (error) throw error;
      allRecentCases = allRecentCases.filter(c => c.id !== id);
      renderRecentList(allRecentCases);
    } catch (err) {
      alert('標記失敗：' + err.message);
    }
  }

  /* ══════════════ 保固到期提醒 ══════════════ */
  const BUILDING_TYPE_LABELS = {
    '1':'公寓', '2':'透天厝', '3':'電梯大廈', '4':'社區', '5':'套房',
    '6':'辦公室', '7':'店面', '10':'廠房', '20':'學校', '30':'醫院', '40':'公共設施'
  };

  async function loadWarrantyAlerts() {
    const listEl = document.getElementById('warrantyList');
    try {
      const now = new Date();
      const to = new Date(); to.setDate(to.getDate() + 730);
      const { data, error } = await supabaseClient.from('documents')
        .select('id, warranty_start, warranty_end, cases!inner(case_number, site_address, building_type, status, customers(name))')
        .eq('doc_type', 'warranty').not('warranty_end', 'is', null)
        .gte('warranty_end', '1900-01-01').lte('warranty_end', to.toISOString().slice(0, 10))
        .neq('cases.status', 'closed').neq('cases.status', 'cancelled').order('warranty_end', { ascending: true });
      if (error) throw error;
      const alerts = (data || []).map(d => {
        const c = { clientName: d.cases?.customers?.name, clientAddress: d.cases?.site_address, caseNumber: d.cases?.case_number,
          buildingType: d.cases?.building_type, warranty: { startDate: d.warranty_start, endDate: d.warranty_end } };
        const end = new Date(d.warranty_end + 'T00:00:00');
        const daysLeft = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
        return { c, end, daysLeft };
      }).filter(a => a.daysLeft <= 730)
        .sort((a, b) => a.daysLeft - b.daysLeft);

      renderWarrantyList(alerts);
    } catch (err) {
      console.error(err);
      listEl.innerHTML = '<div class="warranty-empty">⚠️ 無法讀取保固資料</div>';
    }
  }

  function renderWarrantyList(alerts) {
    const listEl = document.getElementById('warrantyList');
    if (alerts.length === 0) {
      listEl.innerHTML = '<div class="warranty-empty">目前沒有即將到期的保固案件</div>';
      return;
    }
    listEl.innerHTML = alerts.map(({ c, end, daysLeft }) => {
      const level = daysLeft <= 365 ? 'red' : 'orange';
      const buildingLabel = BUILDING_TYPE_LABELS[c.buildingType] || (c.buildingType || '—');
      const startStr = c.warranty.startDate ? new Date(c.warranty.startDate).toLocaleDateString('zh-TW') : '—';
      const endStr = end.toLocaleDateString('zh-TW');
      const daysText = daysLeft < 0 ? `已到期 ${Math.abs(daysLeft)} 天` : `剩 ${daysLeft} 天到期`;
      return `
        <div class="warranty-item ${level}">
          <div class="w-name">${esc(c.clientName || '（未命名委託方）')}</div>
          <div class="w-meta">
            建物類型：${esc(buildingLabel)}<br>
            案號：${esc(c.caseNumber || '—')}<br>
            地址：${esc(c.clientAddress || '—')}<br>
            保固期間：${startStr} ～ ${endStr}
          </div>
          <div class="w-days">${daysText}</div>
        </div>
      `;
    }).join('');
  }

  function toggleCaseMenu(id, ev) {
    ev.stopPropagation();
    document.querySelectorAll('.recent-dropdown').forEach(d => {
      if (d.id !== 'menu-' + id) d.classList.remove('open');
    });
    const dd = document.getElementById('menu-' + id);
    if (dd) dd.classList.toggle('open');
  }
  document.addEventListener('click', () => {
    document.querySelectorAll('.recent-dropdown').forEach(d => d.classList.remove('open'));
  });

  function renderRecentList(list) {
    const listEl = document.getElementById('recentList');
    if (list.length === 0) {
      listEl.innerHTML = '<div class="recent-empty">目前還沒有案件資料，請先在「檢測報告書」建立第一筆案件。</div>';
      return;
    }
    const sorted = [...list].sort((a, b) => {
      if (a.pinned !== b.pinned) return a.pinned ? -1 : 1;
      return 0; // 非置頂維持原本（依更新時間）排序
    });
    listEl.innerHTML = sorted.map(c => {
      const dateStr = c.updatedAt ? new Date(c.updatedAt).toLocaleDateString('zh-TW') : '';
      const caseParam = encodeURIComponent(c.id);
      const pin = isPinned(c.id);
      return `
        <div class="recent-item">
          <div class="recent-info">
            <div class="recent-name">${pin ? '<span class="pin-badge">📌</span>' : ''}${esc(c.clientName || '（未命名委託方）')}　${esc(c.caseNumber || '')}</div>
            <div class="recent-meta">${esc(c.clientAddress || '')}　｜　更新於 ${dateStr}</div>
          </div>
          <div class="recent-actions">
            <a class="recent-btn edit-btn" href="${DOC_URLS.report}?case=${caseParam}" target="_blank" rel="noopener">✏️ 編輯報告書</a>
            <a class="recent-btn" href="${DOC_URLS.quotation}?case=${caseParam}" target="_blank" rel="noopener">建立報價單</a>
            <a class="recent-btn" href="${DOC_URLS.warranty}?case=${caseParam}" target="_blank" rel="noopener">建立保固書</a>
            <a class="recent-btn" href="${DOC_URLS.acceptance}?case=${caseParam}" target="_blank" rel="noopener">建立驗收報告</a>
            <a class="recent-btn" href="${DOC_URLS.commission}?case=${caseParam}" target="_blank" rel="noopener">建立委託書</a>
            <div class="recent-menu-wrap">
              <button class="recent-menu-btn" onclick="toggleCaseMenu('${c.id}', event)">⋮</button>
              <div class="recent-dropdown" id="menu-${c.id}">
                <button onclick="togglePin('${c.id}')">${pin ? '📌 取消置頂' : '📌 置頂此案件'}</button>
                <button onclick="if(confirm('標記為已結案後，這筆案件會從最近項目移除，確定嗎？')) markCaseClosed('${c.id}')">✅ 標記已結案</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  let latestSearchTerm = '';
  async function filterRecent() {
    const term = document.getElementById('recentSearch').value.trim().toLowerCase();
    if (!term) { renderRecentList(allRecentCases); return; }
    latestSearchTerm = term;
    const listEl = document.getElementById('recentList');
    listEl.innerHTML = '<div class="recent-loading">搜尋歷史案件中...</div>';
    const { data, error } = await supabaseClient.rpc('portal_case_search', { search_term: term, result_limit: 30 });
    if (term !== latestSearchTerm) return;
    if (error) { listEl.innerHTML = '<div class="recent-empty">⚠️ 搜尋失敗：' + esc(error.message) + '</div>'; return; }
    renderRecentList((data || []).map(c => ({
      id: c.case_id, caseNumber: c.case_number, clientName: c.client_name,
      clientAddress: c.site_address, updatedAt: c.updated_at, pinned: isPinned(c.case_id)
    })));
  }

  window.onload = async () => {
    const { data } = await supabaseClient.auth.getSession();
    currentUser = data.session?.user || null;
    if (currentUser) showMenu();
    else document.getElementById('loginPage').style.display = '';
  };

  async function doLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('pwInput').value;
    const err = document.getElementById('errorMsg');
    if (!email || !password) {
      err.textContent = '請輸入 Email 與密碼。';
      return;
    }
    const button = document.querySelector('.login-btn');
    button.disabled = true; button.textContent = '登入中…';
    try {
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) throw error;
      currentUser = data.user;
      err.textContent = '';
      document.getElementById('loginPage').style.animation = 'none';
      document.getElementById('loginPage').style.opacity = '0';
      document.getElementById('loginPage').style.transition = 'opacity .25s';
      setTimeout(showMenu, 260);
    } catch (error) {
      err.textContent = '登入失敗：' + (error.message || '請確認帳號與密碼。');
      document.getElementById('pwInput').select();
      const input = document.getElementById('pwInput');
      input.style.borderColor = '#d32f2f';
      setTimeout(() => input.style.borderColor = '', 800);
    } finally {
      button.disabled = false; button.textContent = '進入系統';
    }
  }

  function showMenu() {
    document.getElementById('loginPage').style.display = 'none';
    const menu = document.getElementById('menuPage');
    menu.style.display = 'block';
    loadDashboard();
    loadRecentCases();
    loadWarrantyAlerts();
  }

  async function doLogout() {
    await supabaseClient.auth.signOut();
    currentUser = null;
    document.getElementById('menuPage').style.display = 'none';
    const login = document.getElementById('loginPage');
    login.style.display = '';
    login.style.opacity = '1';
    login.style.animation = 'fadeIn .35s ease';
    document.getElementById('emailInput').value = '';
    document.getElementById('pwInput').value = '';
    document.getElementById('errorMsg').textContent = '';
  }

  function togglePw() {
    const input = document.getElementById('pwInput');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      input.type = 'password';
      icon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>`;
    }
  }
</script>
</body>
</html>
