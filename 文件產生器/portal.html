<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>詠順工程行｜文件產生器</title>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:      #1871b5;
    --blue-dark: #145fa0;
    --blue-pale: #e8f2fb;
    --line:      #d0dcea;
    --text:      #1a2233;
    --sub:       #6b7a92;
    --bg:        #f4f7fb;
    --white:     #ffffff;
    --radius:    12px;
    --shadow:    0 2px 16px rgba(24,113,181,0.10);
    --shadow-hv: 0 6px 28px rgba(24,113,181,0.18);
  }

  body {
    font-family: 'Microsoft JhengHei','微軟正黑體','PingFang TC',Arial,sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  /* ── 密碼頁 ── */
  #loginPage {
    width: 100%;
    max-width: 420px;
    animation: fadeIn .35s ease;
  }

  .login-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 48px 40px 40px;
    text-align: center;
  }

  .brand-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--blue-pale);
    color: var(--blue);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .5px;
    padding: 6px 14px;
    border-radius: 99px;
    margin-bottom: 28px;
  }

  .brand-badge svg { width: 14px; height: 14px; flex-shrink: 0; }

  .login-card h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .5px;
    margin-bottom: 8px;
  }

  .login-card p {
    font-size: 13.5px;
    color: var(--sub);
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .input-wrap input {
    width: 100%;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    padding: 13px 46px 13px 16px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: #fafcff;
    outline: none;
    transition: border .2s, box-shadow .2s;
    letter-spacing: 2px;
  }

  .input-wrap input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(24,113,181,.12);
    background: #fff;
  }

  .toggle-eye {
    position: absolute;
    right: 13px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--sub);
    padding: 4px;
    line-height: 0;
    transition: color .15s;
  }
  .toggle-eye:hover { color: var(--blue); }

  .login-btn {
    width: 100%;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background .2s, transform .1s, box-shadow .2s;
    box-shadow: 0 3px 10px rgba(24,113,181,.25);
  }
  .login-btn:hover  { background: var(--blue-dark); box-shadow: 0 5px 16px rgba(24,113,181,.32); }
  .login-btn:active { transform: scale(.98); }

  .error-msg {
    font-size: 12.5px;
    color: #d32f2f;
    margin-top: 10px;
    min-height: 18px;
    text-align: left;
  }

  .remember-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    color: var(--sub);
    margin-bottom: 18px;
    cursor: pointer;
    text-align: left;
  }
  .remember-row input {
    width: 15px; height: 15px;
    accent-color: var(--blue);
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ── 選單頁 ── */
  #menuPage {
    width: 100%;
    max-width: 1320px;
    display: none;
    animation: fadeIn .4s ease;
  }

  .menu-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .menu-header .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .logo-icon {
    width: 38px; height: 38px;
    background: var(--blue);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 22px; height: 22px; color: #fff; }

  .menu-header h2 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .5px;
  }

  .menu-header p {
    font-size: 13px;
    color: var(--sub);
    margin-top: 4px;
  }

  .card-list {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 28px;
  }

  .doc-card {
    background: var(--white);
    border: 1.5px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 20px 22px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 14px;
    text-decoration: none;
    color: inherit;
    box-shadow: var(--shadow);
    transition: border-color .2s, box-shadow .2s, transform .15s;
    cursor: pointer;
  }

  .doc-card:hover {
    border-color: var(--blue);
    box-shadow: var(--shadow-hv);
    transform: translateY(-2px);
  }

  .doc-card-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .card-icon {
    width: 42px; height: 42px; flex-shrink: 0;
    background: var(--blue-pale);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .card-icon svg { width: 24px; height: 24px; color: var(--blue); }

  .card-body strong {
    display: block;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: .3px;
    line-height: 1.3;
  }

  .card-body span {
    display: block;
    font-size: 12.5px;
    color: var(--sub);
    margin-top: 3px;
    line-height: 1.4;
  }

  .card-preview {
    width: 100%;
    aspect-ratio: 210 / 297; /* A4 直式比例 */
    background: #f4f7fb;
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  .card-arrow {
    color: var(--blue);
    opacity: .5;
    transition: opacity .2s, transform .2s;
    align-self: flex-end;
  }
  .doc-card:hover .card-arrow { opacity: 1; transform: translateX(3px); }

  .logout-row {
    text-align: center;
  }

  .logout-btn {
    background: none;
    border: none;
    font-size: 12.5px;
    color: var(--sub);
    cursor: pointer;
    font-family: inherit;
    padding: 6px 12px;
    border-radius: 6px;
    transition: color .15s, background .15s;
  }
  .logout-btn:hover { color: var(--blue); background: var(--blue-pale); }

  /* ── 分隔線 ── */
  .divider {
    border: none;
    border-top: 1px solid var(--line);
    margin: 28px 0;
  }

  /* ── 動畫 ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RWD ── */
  @media (max-width: 1100px) {
    .card-list { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .card-list { grid-template-columns: 1fr; }
  }
  @media (max-width: 480px) {
    .login-card { padding: 36px 24px 32px; }
    .doc-card   { padding: 16px 16px 18px; }
  }

  /* ── 最近項目 ── */
  .recent-section { margin-bottom: 32px; }
  .recent-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .recent-header h3 { font-size: 15px; font-weight: 700; color: var(--text); }
  .recent-search { border: 1.5px solid var(--line); border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: inherit; width: 240px; background: #fafcff; outline: none; }
  .recent-search:focus { border-color: var(--blue); background: #fff; }
  .recent-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
  .recent-item {
    background: var(--white); border: 1.5px solid var(--line); border-radius: 10px;
    padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
    gap: 14px; box-shadow: var(--shadow); flex-wrap: wrap;
  }
  .recent-info { min-width: 180px; }
  .recent-name { font-size: 14.5px; font-weight: 700; color: var(--text); }
  .recent-meta { font-size: 12px; color: var(--sub); margin-top: 3px; }
  .recent-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .recent-btn {
    background: var(--blue-pale); color: var(--blue); border: none; border-radius: 7px;
    padding: 7px 12px; font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: inherit;
    text-decoration: none; white-space: nowrap; transition: background .15s;
  }
  .recent-btn:hover { background: var(--blue); color: #fff; }
  .recent-empty, .recent-loading { font-size: 13px; color: var(--sub); padding: 16px; text-align: center; background: var(--white); border-radius: 10px; border: 1.5px dashed var(--line); }
</style>
</head>
<body>

<!-- ══════════════ 密碼頁 ══════════════ -->
<div id="loginPage">
  <div class="login-card">

    <div class="brand-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      詠順工程行
    </div>

    <h1>文件產生系統</h1>
    <p>請輸入公司密碼以進入<br>保固書 ／ 報價單 ／ 檢測報告書 ／ 委託書 產生器</p>

    <div class="input-wrap">
      <input type="password" id="pwInput" placeholder="請輸入密碼"
             onkeydown="if(event.key==='Enter') doLogin()">
      <button class="toggle-eye" onclick="togglePw()" title="顯示／隱藏密碼">
        <svg id="eyeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <label class="remember-row">
      <input type="checkbox" id="rememberMe" checked>
      <span>記住這台電腦（30 天內免再次輸入密碼）</span>
    </label>

    <button class="login-btn" onclick="doLogin()">進入系統</button>
    <div class="error-msg" id="errorMsg"></div>

  </div>
</div>

<!-- ══════════════ 選單頁 ══════════════ -->
<div id="menuPage">

  <div class="menu-header">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <h2>詠順工程行</h2>
    </div>
    <p>請選擇要開啟的文件產生器</p>
  </div>

  <div class="recent-section">
    <div class="recent-header">
      <h3>📂 最近項目</h3>
      <input type="text" class="recent-search" id="recentSearch" placeholder="搜尋委託方姓名／地址..." oninput="filterRecent()">
    </div>
    <div class="recent-list" id="recentList">
      <div class="recent-loading">讀取中...</div>
    </div>
  </div>

  <div class="card-list">

    <!-- 檢測報告書 -->
    <a class="doc-card" href="https://mrbusinesslab.github.io/Yong-Shun/%E6%AA%A2%E6%B8%AC%E5%A0%B1%E5%91%8A%E6%9B%B8/report.html" target="_blank" rel="noopener">
      <div class="doc-card-title">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
        </div>
        <div class="card-body">
          <strong>檢測報告書</strong>
          <span>產生漏水檢測現場報告 PDF</span>
        </div>
      </div>
      <div class="card-preview">
        <img src="範例圖1.png" alt="檢測報告書範例" loading="lazy" onerror="imgFallback(this,'範例圖1.png')">
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" width="16" height="16" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>

    <!-- 報價單 -->
    <a class="doc-card" href="https://mrbusinesslab.github.io/Yong-Shun/%E5%A0%B1%E5%83%B9%E5%96%AE/quotation.html" target="_blank" rel="noopener">
      <div class="doc-card-title">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
        <div class="card-body">
          <strong>工程報價單</strong>
          <span>建立工程估價明細與報價 PDF</span>
        </div>
      </div>
      <div class="card-preview">
        <img src="範例圖2.png" alt="工程報價單範例" loading="lazy" onerror="imgFallback(this,'範例圖2.png')">
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" width="16" height="16" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>

    <!-- 保固書 -->
    <a class="doc-card" href="https://mrbusinesslab.github.io/Yong-Shun/%E4%BF%9D%E5%9B%BA%E6%9B%B8/warranty.html" target="_blank" rel="noopener">
      <div class="doc-card-title">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div class="card-body">
          <strong>施工保固書</strong>
          <span>產生工程竣工保固證明文件 PDF</span>
        </div>
      </div>
      <div class="card-preview">
        <img src="範例圖3.png" alt="施工保固書範例" loading="lazy" onerror="imgFallback(this,'範例圖3.png')">
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" width="16" height="16" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>

    <!-- 第三方委託書 -->
    <a class="doc-card" href="https://mrbusinesslab.github.io/Yong-Shun/%E7%AC%AC%E4%B8%89%E6%96%B9%E5%A7%94%E8%A8%97%E6%9B%B8/commission.html" target="_blank" rel="noopener">
      <div class="doc-card-title">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="13" y2="17"/>
          </svg>
        </div>
        <div class="card-body">
          <strong>第三方委託書</strong>
          <span>設計師／房仲委託檢測或施工 PDF</span>
        </div>
      </div>
      <div class="card-preview">
        <img src="範例圖4.png" alt="第三方委託書範例" loading="lazy" onerror="imgFallback(this,'範例圖4.png')">
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" width="16" height="16" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>

  </div>

  <hr class="divider">

  <div class="logout-row">
    <button class="logout-btn" onclick="doLogout()">
      ← 登出
    </button>
  </div>

</div>

<script>
  function imgFallback(img, name) {
    img.parentElement.innerHTML = '<span style="font-size:11px;color:#bbb;text-align:center;line-height:1.6;">' + name + '<br>尚未上傳</span>';
  }

  const CORRECT_PW = 'srsr520520';
  const SESSION_KEY = 'yongshun_auth';
  const REMEMBER_KEY = 'yongshun_auth_until'; // localStorage：存到期時間戳
  const REMEMBER_DAYS = 30;

  /* ══════════════ Firebase 初始化 ══════════════ */
  const firebaseConfig = {
    apiKey: "AIzaSyD2wWHP27kqd005xAuz-DEuEg_z9A8YCVc",
    authDomain: "yong-shun.firebaseapp.com",
    projectId: "yong-shun",
    storageBucket: "yong-shun.firebasestorage.app",
    messagingSenderId: "530988019396",
    appId: "1:530988019396:web:6554ce1e9f977bd5182391"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 各文件產生器的網址（沿用你現有的資料夾與檔名規則）
  // ※ 若之後路徑有調整，只要改這裡即可，其他地方不用動
  const DOC_URLS = {
    quotation:  'https://mrbusinesslab.github.io/Yong-Shun/%E5%A0%B1%E5%83%B9%E5%96%AE/quotation.html',
    warranty:   'https://mrbusinesslab.github.io/Yong-Shun/%E4%BF%9D%E5%9B%BA%E6%9B%B8/warranty.html',
    commission: 'https://mrbusinesslab.github.io/Yong-Shun/%E7%AC%AC%E4%B8%89%E6%96%B9%E5%A7%94%E8%A8%97%E6%9B%B8/commission.html',
    acceptance: 'https://mrbusinesslab.github.io/Yong-Shun/%E9%A9%97%E6%94%B6%E5%A0%B1%E5%91%8A/acceptance-report.html',
  };

  let allRecentCases = [];

  async function loadRecentCases() {
    const listEl = document.getElementById('recentList');
    try {
      const snap = await db.collection('cases').orderBy('updatedAt', 'desc').limit(15).get();
      allRecentCases = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderRecentList(allRecentCases);
    } catch (err) {
      console.error(err);
      listEl.innerHTML = '<div class="recent-empty">⚠️ 無法讀取最近項目（' + err.message + '）</div>';
    }
  }

  function esc(str) { return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function renderRecentList(list) {
    const listEl = document.getElementById('recentList');
    if (list.length === 0) {
      listEl.innerHTML = '<div class="recent-empty">目前還沒有案件資料，請先在「檢測報告書」建立第一筆案件。</div>';
      return;
    }
    listEl.innerHTML = list.map(c => {
      const dateStr = c.updatedAt && c.updatedAt.toDate ? c.updatedAt.toDate().toLocaleDateString('zh-TW') : '';
      const caseParam = encodeURIComponent(c.id);
      return `
        <div class="recent-item">
          <div class="recent-info">
            <div class="recent-name">${esc(c.clientName || '（未命名委託方）')}　${esc(c.caseNumber || '')}</div>
            <div class="recent-meta">${esc(c.clientAddress || '')}　｜　更新於 ${dateStr}</div>
          </div>
          <div class="recent-actions">
            <a class="recent-btn" href="${DOC_URLS.quotation}?case=${caseParam}" target="_blank" rel="noopener">建立報價單</a>
            <a class="recent-btn" href="${DOC_URLS.warranty}?case=${caseParam}" target="_blank" rel="noopener">建立保固書</a>
            <a class="recent-btn" href="${DOC_URLS.acceptance}?case=${caseParam}" target="_blank" rel="noopener">建立驗收報告</a>
            <a class="recent-btn" href="${DOC_URLS.commission}?case=${caseParam}" target="_blank" rel="noopener">建立委託書</a>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterRecent() {
    const term = document.getElementById('recentSearch').value.trim().toLowerCase();
    if (!term) { renderRecentList(allRecentCases); return; }
    const filtered = allRecentCases.filter(c => {
      const hay = [c.clientName, c.clientAddress, c.caseNumber].join(' ').toLowerCase();
      return hay.includes(term);
    });
    renderRecentList(filtered);
  }

  function isRemembered() {
    const until = localStorage.getItem(REMEMBER_KEY);
    if (!until) return false;
    if (Date.now() > parseInt(until, 10)) {
      localStorage.removeItem(REMEMBER_KEY); // 過期自動清除
      return false;
    }
    return true;
  }

  // 頁面載入時檢查：先看「記住此電腦」(localStorage)，再看本次分頁 session
  window.onload = () => {
    if (isRemembered() || sessionStorage.getItem(SESSION_KEY) === '1') showMenu();
    else document.getElementById('loginPage').style.display = '';
  };

  function doLogin() {
    const val = document.getElementById('pwInput').value;
    const err = document.getElementById('errorMsg');
    const remember = document.getElementById('rememberMe').checked;
    if (val === CORRECT_PW) {
      sessionStorage.setItem(SESSION_KEY, '1');
      if (remember) {
        const until = Date.now() + REMEMBER_DAYS * 24 * 60 * 60 * 1000;
        localStorage.setItem(REMEMBER_KEY, String(until));
      } else {
        localStorage.removeItem(REMEMBER_KEY);
      }
      err.textContent = '';
      document.getElementById('loginPage').style.animation = 'none';
      document.getElementById('loginPage').style.opacity = '0';
      document.getElementById('loginPage').style.transition = 'opacity .25s';
      setTimeout(showMenu, 260);
    } else {
      err.textContent = '密碼錯誤，請再試一次。';
      document.getElementById('pwInput').select();
      // 抖動效果
      const input = document.getElementById('pwInput');
      input.style.borderColor = '#d32f2f';
      setTimeout(() => input.style.borderColor = '', 800);
    }
  }

  function showMenu() {
    document.getElementById('loginPage').style.display = 'none';
    const menu = document.getElementById('menuPage');
    menu.style.display = 'block';
    loadRecentCases();
  }

  function doLogout() {
    sessionStorage.removeItem(SESSION_KEY);
    localStorage.removeItem(REMEMBER_KEY); // 登出時一併清除「記住此電腦」
    document.getElementById('menuPage').style.display = 'none';
    const login = document.getElementById('loginPage');
    login.style.display = '';
    login.style.opacity = '1';
    login.style.animation = 'fadeIn .35s ease';
    document.getElementById('pwInput').value = '';
    document.getElementById('errorMsg').textContent = '';
  }

  function togglePw() {
    const input = document.getElementById('pwInput');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      input.type = 'password';
      icon.innerHTML = `
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>`;
    }
  }
</script>
</body>
</html>
